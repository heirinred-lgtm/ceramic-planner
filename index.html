<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c5aa0">
    <meta name="description" content="景德镇画瓷之旅素材整理与盘子采购计划">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Chinese%20ceramic%20plate%20painting%20icon%2C%20blue%20and%20white%20porcelain%2C%20minimal%20design&image_size=square">
    <title>景德镇画瓷之旅 - 素材整理与采购计划</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2c5aa0;
            --secondary-color: #f8f5f0;
            --accent-color: #e63946;
            --text-color: #333;
            --light-text: #666;
            --border-color: #e0e0e0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --border-radius: 8px;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-image: url('background.png');
            background-repeat: repeat;
            background-size: 25%;
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
        }

        h1 {
            font-family: 'Noto Serif SC', serif;
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--light-text);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .instructions {
            background-color: white;
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            text-align: center;
            font-size: 0.95rem;
            color: var(--light-text);
        }

        .add-card-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .add-card-input {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 1rem;
            width: 300px;
        }

        .add-card-btn {
            padding: 12px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .add-card-btn:hover {
            background-color: #1a3d7a;
        }

        .card-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 25px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title-input {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.3rem;
            color: var(--primary-color);
            border: none;
            background: transparent;
            border-bottom: 1px solid transparent;
            padding: 5px 0;
            width: 300px;
        }

        .card-title-input:hover,
        .card-title-input:focus {
            border-bottom-color: var(--primary-color);
            outline: none;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .delete-card-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            padding: 8px 15px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .delete-card-btn:hover {
            background-color: #c1121f;
        }

        .image-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .image-item {
            position: relative;
            width: 150px;
            height: 150px;
            background-color: #f0f0f0;
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }

        .image-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .placeholder-icon {
            font-size: 2.5rem;
            color: var(--light-text);
        }

        .delete-image-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-item:hover .delete-image-btn {
            opacity: 1;
        }

        .add-image-btn {
            width: 150px;
            height: 150px;
            background-color: #f8f8f8;
            border: 2px dashed var(--border-color);
            border-radius: var(--border-radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        .add-image-btn:hover {
            border-color: var(--primary-color);
            background-color: #f0f4f8;
        }

        .add-image-btn i {
            font-size: 2rem;
            color: var(--light-text);
            margin-bottom: 5px;
        }

        .add-image-btn span {
            font-size: 0.75rem;
            color: var(--light-text);
        }

        /* 图片放大模态框 */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .image-modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .image-modal img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #ccc;
        }

        .upload-input {
            display: none;
        }

        .plate-section {
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .plate-section h4 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .plate-form {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .plate-input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 0.95rem;
        }

        .plate-add-btn {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .plate-add-btn:hover {
            background-color: #1a3d7a;
        }

        .plate-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            list-style: none;
        }

        .plate-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: var(--secondary-color);
            border-radius: var(--border-radius);
            font-size: 0.9rem;
        }

        .plate-delete-btn {
            background-color: transparent;
            color: var(--accent-color);
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plate-delete-btn:hover {
            color: #c1121f;
        }

        .summary {
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 25px;
            margin-top: 30px;
        }

        .summary h2 {
            font-family: 'Noto Serif SC', serif;
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .summary-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .total-price {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }



        .summary-plate-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .summary-plate-item {
            display: flex;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--light-border);
        }

        .summary-plate-item:last-child {
            border-bottom: none;
        }

        .plate-checkbox {
            margin-right: 0.75rem;
        }

        .summary-plate-item span {
            flex: 1;
        }

        .plate-price {
            width: 80px;
            padding: 0.25rem;
            border: 1px solid var(--light-border);
            border-radius: 4px;
            text-align: right;
        }

        .summary-plate-item.completed {
            text-decoration: line-through;
            color: #999;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--light-border);
        }

        .summary-item:last-child {
            font-weight: bold;
            border-bottom: none;
        }

        @media (max-width: 768px) {
            .add-card-form {
                flex-direction: column;
                align-items: stretch;
            }

            .add-card-input {
                width: 100%;
            }

            .card-title-input {
                width: 200px;
            }

            h1 {
                font-size: 2rem;
            }

            .container {
                padding: 15px;
            }

            .card {
                padding: 20px;
            }

            .image-gallery {
                gap: 10px;
            }

            .image-item,
            .add-image-btn {
                width: 120px;
                height: 120px;
            }

            .add-image-btn i {
                font-size: 1.5rem;
            }

            .plate-form {
                flex-direction: column;
            }

            .plate-list {
                justify-content: center;
            }

            .summary {
                padding: 20px;
            }

            .summary-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .card-title-input {
                width: 150px;
                font-size: 1.1rem;
            }

            .image-item,
            .add-image-btn {
                width: 100px;
                height: 100px;
            }

            .add-image-btn span {
                font-size: 0.75rem;
            }

            .plate-input {
                font-size: 0.85rem;
            }

            .plate-add-btn {
                font-size: 0.85rem;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>景德镇画瓷之旅</h1>
            <div class="subtitle">素材整理与盘子采购计划</div>
        </header>

        <div class="instructions">
            记录您的参考图片和素材，在每个卡片中添加需要的盘子，底部自动生成采购总结。
        </div>

        <div class="add-card-form">
            <input type="text" class="add-card-input" id="newCardName" placeholder="输入新卡片名称">
            <button class="add-card-btn" onclick="addNewCard()">添加卡片</button>
        </div>

        <div class="card-grid" id="cardGrid">
            <!-- 默认卡片1 -->
            <div class="card" data-card-id="1">
                <div class="card-header">
                    <input type="text" class="card-title-input" value="青花山水大盘" onchange="updateCardTitle(this)">
                    <div class="card-actions">
                        <button class="delete-card-btn" onclick="deleteCard(this)">删除卡片</button>
                    </div>
                </div>
                <div class="image-gallery">
                    <input type="file" class="upload-input" accept="image/*" onchange="uploadImage(this)">
                    <div class="add-image-btn" onclick="triggerAddImage(this)">
                        <i class="fas fa-plus"></i>
                        <span>添加图片</span>
                    </div>
                </div>
                <div class="plate-section">
                    <h4>需要的盘子</h4>
                    <div class="plate-form">
                        <input type="text" class="plate-input" placeholder="输入盘子形状，例如 8寸圆盘">
                        <button class="plate-add-btn" onclick="addPlateToCard(this)">添加</button>
                    </div>
                    <ul class="plate-list"></ul>
                </div>
            </div>

            <!-- 默认卡片2 -->
            <div class="card" data-card-id="2">
                <div class="card-header">
                    <input type="text" class="card-title-input" value="釉里红鱼藻纹盘" onchange="updateCardTitle(this)">
                    <div class="card-actions">
                        <button class="delete-card-btn" onclick="deleteCard(this)">删除卡片</button>
                    </div>
                </div>
                <div class="image-gallery">
                    <input type="file" class="upload-input" accept="image/*" onchange="uploadImage(this)">
                    <div class="add-image-btn" onclick="triggerAddImage(this)">
                        <i class="fas fa-plus"></i>
                        <span>添加图片</span>
                    </div>
                </div>
                <div class="plate-section">
                    <h4>需要的盘子</h4>
                    <div class="plate-form">
                        <input type="text" class="plate-input" placeholder="输入盘子形状，例如 8寸圆盘">
                        <button class="plate-add-btn" onclick="addPlateToCard(this)">添加</button>
                    </div>
                    <ul class="plate-list"></ul>
                </div>
            </div>

            <!-- 默认卡片3 -->
            <div class="card" data-card-id="3">
                <div class="card-header">
                    <input type="text" class="card-title-input" value="明代青花缠枝莲线稿" onchange="updateCardTitle(this)">
                    <div class="card-actions">
                        <button class="delete-card-btn" onclick="deleteCard(this)">删除卡片</button>
                    </div>
                </div>
                <div class="image-gallery">
                    <input type="file" class="upload-input" accept="image/*" onchange="uploadImage(this)">
                    <div class="add-image-btn" onclick="triggerAddImage(this)">
                        <i class="fas fa-plus"></i>
                        <span>添加图片</span>
                    </div>
                </div>
                <div class="plate-section">
                    <h4>需要的盘子</h4>
                    <div class="plate-form">
                        <input type="text" class="plate-input" placeholder="输入盘子形状，例如 8寸圆盘">
                        <button class="plate-add-btn" onclick="addPlateToCard(this)">添加</button>
                    </div>
                    <ul class="plate-list"></ul>
                </div>
            </div>

            <!-- 默认卡片4 -->
            <div class="card" data-card-id="4">
                <div class="card-header">
                    <input type="text" class="card-title-input" value="釉下五彩花卉盘" onchange="updateCardTitle(this)">
                    <div class="card-actions">
                        <button class="delete-card-btn" onclick="deleteCard(this)">删除卡片</button>
                    </div>
                </div>
                <div class="image-gallery">
                    <input type="file" class="upload-input" accept="image/*" onchange="uploadImage(this)">
                    <div class="add-image-btn" onclick="triggerAddImage(this)">
                        <i class="fas fa-plus"></i>
                        <span>添加图片</span>
                    </div>
                </div>
                <div class="plate-section">
                    <h4>需要的盘子</h4>
                    <div class="plate-form">
                        <input type="text" class="plate-input" placeholder="输入盘子形状，例如 8寸圆盘">
                        <button class="plate-add-btn" onclick="addPlateToCard(this)">添加</button>
                    </div>
                    <ul class="plate-list"></ul>
                </div>
            </div>

            <!-- 默认卡片5 -->
            <div class="card" data-card-id="5">
                <div class="card-header">
                    <input type="text" class="card-title-input" value="水彩风格花卉配色" onchange="updateCardTitle(this)">
                    <div class="card-actions">
                        <button class="delete-card-btn" onclick="deleteCard(this)">删除卡片</button>
                    </div>
                </div>
                <div class="image-gallery">
                    <input type="file" class="upload-input" accept="image/*" onchange="uploadImage(this)">
                    <div class="add-image-btn" onclick="triggerAddImage(this)">
                        <i class="fas fa-plus"></i>
                        <span>添加图片</span>
                    </div>
                </div>
                <div class="plate-section">
                    <h4>需要的盘子</h4>
                    <div class="plate-form">
                        <input type="text" class="plate-input" placeholder="输入盘子形状，例如 8寸圆盘">
                        <button class="plate-add-btn" onclick="addPlateToCard(this)">添加</button>
                    </div>
                    <ul class="plate-list"></ul>
                </div>
            </div>

            <!-- 默认卡片6 -->
            <div class="card" data-card-id="6">
                <div class="card-header">
                    <input type="text" class="card-title-input" value="釉里红鱼纹素材" onchange="updateCardTitle(this)">
                    <div class="card-actions">
                        <button class="delete-card-btn" onclick="deleteCard(this)">删除卡片</button>
                    </div>
                </div>
                <div class="image-gallery">
                    <input type="file" class="upload-input" accept="image/*" onchange="uploadImage(this)">
                    <div class="add-image-btn" onclick="triggerAddImage(this)">
                        <i class="fas fa-plus"></i>
                        <span>添加图片</span>
                    </div>
                </div>
                <div class="plate-section">
                    <h4>需要的盘子</h4>
                    <div class="plate-form">
                        <input type="text" class="plate-input" placeholder="输入盘子形状，例如 8寸圆盘">
                        <button class="plate-add-btn" onclick="addPlateToCard(this)">添加</button>
                    </div>
                    <ul class="plate-list"></ul>
                </div>
            </div>
        </div>

        <!-- 底部采购总结 -->
        <div class="summary">
            <h2>盘子采购总结</h2>
            <div class="summary-content" id="summaryContent">
                <!-- 动态生成的总结内容 -->
            </div>
        </div>
    </div>

    <script>
        let cardIdCounter = 7;

        function addNewCard() {
            const input = document.getElementById('newCardName');
            const cardName = input.value.trim();
            
            if (!cardName) {
                alert('请输入卡片名称');
                return;
            }

            const cardGrid = document.getElementById('cardGrid');
            const newCard = document.createElement('div');
            newCard.className = 'card';
            newCard.dataset.cardId = cardIdCounter;
            
            newCard.innerHTML = `
                <div class="card-header">
                    <input type="text" class="card-title-input" value="${cardName}" onchange="updateCardTitle(this)">
                    <div class="card-actions">
                        <button class="delete-card-btn" onclick="deleteCard(this)">删除卡片</button>
                    </div>
                </div>
                <div class="image-gallery">
                    <input type="file" class="upload-input" accept="image/*" onchange="uploadImage(this)">
                    <div class="add-image-btn" onclick="triggerAddImage(this)">
                        <i class="fas fa-plus"></i>
                        <span>添加图片</span>
                    </div>
                </div>
                <div class="plate-section">
                    <h4>需要的盘子</h4>
                    <div class="plate-form">
                        <input type="text" class="plate-input" placeholder="输入盘子形状，例如 8寸圆盘">
                        <button class="plate-add-btn" onclick="addPlateToCard(this)">添加</button>
                    </div>
                    <ul class="plate-list"></ul>
                </div>
            `;
            
            // 将新卡片添加到网格的最上层
            cardGrid.insertBefore(newCard, cardGrid.firstChild);
            input.value = '';
            
            // 保存新卡片到localStorage
            saveCardData(newCard);
            
            cardIdCounter++;
            updateSummary();
        }

        function deleteCard(button) {
            const card = button.closest('.card');
            
            // 二次确认
            if (confirm('确定要删除这个卡片吗？')) {
                const cardId = card.dataset.cardId;
                card.remove();
                
                // 从localStorage中删除卡片数据
                let allCardsData = JSON.parse(localStorage.getItem('jdzCeramicCards')) || [];
                allCardsData = allCardsData.filter(item => item.id !== cardId);
                localStorage.setItem('jdzCeramicCards', JSON.stringify(allCardsData));
                
                updateSummary();
            }
        }

        function updateCardTitle(input) {
            const card = input.closest('.card');
            // 保存卡片数据到localStorage
            saveCardData(card);
            updateSummary();
        }

        function triggerFileInput(imageItem) {
            const card = imageItem.closest('.card');
            const uploadInput = card.querySelector('.upload-input');
            uploadInput.click();
        }

        function triggerAddImage(addBtn) {
            const card = addBtn.closest('.card');
            const uploadInput = card.querySelector('.upload-input');
            uploadInput.click();
        }

        function uploadImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                const imageGallery = input.parentElement;
                const addBtn = input.nextElementSibling;
                const card = input.closest('.card');
                
                reader.onload = function(e) {
                    const base64Image = e.target.result;
                    
                    // 创建新的图片项
                    const newImageItem = document.createElement('div');
                    newImageItem.className = 'image-item';
                    newImageItem.onclick = function() { enlargeImage(this.querySelector('img').src); };
                    newImageItem.innerHTML = `
                        <img src="${base64Image}">
                        <button class="delete-image-btn" onclick="deleteImage(this, event)">
                            <i class="fas fa-times"></i>
                        </button>
                    `;
                    // 在添加按钮前插入（最右侧）
                addBtn.before(newImageItem);
                    
                    // 保存图片到localStorage
                    saveCardData(card);
                }
                
                reader.readAsDataURL(input.files[0]);
            }
        }

        function deleteImage(button, event) {
            event.stopPropagation();
            const imageItem = button.parentElement;
            const card = imageItem.closest('.card');
            
            // 二次确认
            if (confirm('确定要删除这张图片吗？')) {
                // 删除图片项
                imageItem.remove();
                
                // 保存卡片数据到localStorage
                saveCardData(card);
            }
        }

        // 放大图片
        function enlargeImage(imageSrc) {
            // 创建模态框
            const modal = document.createElement('div');
            modal.className = 'image-modal';
            modal.onclick = function(e) {
                if (e.target === modal) {
                    closeModal();
                }
            };
            
            modal.innerHTML = `
                <div class="image-modal-content">
                    <span class="close-modal" onclick="closeModal()">&times;</span>
                    <img src="${imageSrc}">
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 阻止事件冒泡
            modal.querySelector('.image-modal-content').onclick = function(e) {
                e.stopPropagation();
            };
        }

        // 关闭模态框
        function closeModal() {
            const modal = document.querySelector('.image-modal');
            if (modal) {
                modal.remove();
            }
        }

        // 保存卡片数据到localStorage
        function saveCardData(card) {
            const cardId = card.dataset.cardId;
            const cardTitle = card.querySelector('.card-title-input').value;
            
            // 收集盘子数据
            const plates = [];
            card.querySelectorAll('.plate-item span').forEach(span => {
                plates.push(span.textContent);
            });
            
            // 构建卡片数据（不存储图片，图片从本地相册获取）
            const cardData = {
                id: cardId,
                title: cardTitle,
                plates: plates
            };
            
            // 获取所有卡片数据
            let allCardsData = JSON.parse(localStorage.getItem('jdzCeramicCards')) || [];
            
            // 检查是否已存在该卡片
            const existingIndex = allCardsData.findIndex(item => item.id === cardId);
            
            if (existingIndex !== -1) {
                // 更新现有卡片
                allCardsData[existingIndex] = cardData;
            } else {
                // 添加新卡片
                allCardsData.push(cardData);
            }
            
            // 保存到localStorage
            localStorage.setItem('jdzCeramicCards', JSON.stringify(allCardsData));
        }

        // 从localStorage加载卡片数据
        function loadCardData() {
            const allCardsData = JSON.parse(localStorage.getItem('jdzCeramicCards')) || [];
            const cardGrid = document.getElementById('cardGrid');
            
            // 清空现有卡片
            cardGrid.innerHTML = '';
            
            // 重新创建卡片
            allCardsData.forEach(cardData => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.cardId = cardData.id;
                
                // 构建盘子部分
                let platesHTML = '';
                if (cardData.plates && cardData.plates.length > 0) {
                    cardData.plates.forEach(plate => {
                        platesHTML += `
                            <li class="plate-item">
                                <span>${plate}</span>
                                <button class="plate-delete-btn" onclick="deletePlateFromCard(this)">
                                    <i class="fas fa-times"></i>
                                </button>
                            </li>
                        `;
                    });
                }
                
                card.innerHTML = `
                    <div class="card-header">
                        <input type="text" class="card-title-input" value="${cardData.title}" onchange="updateCardTitle(this)">
                        <div class="card-actions">
                            <button class="delete-card-btn" onclick="deleteCard(this)">删除卡片</button>
                        </div>
                    </div>
                    <div class="image-gallery">
                        <input type="file" class="upload-input" accept="image/*" onchange="uploadImage(this)">
                        <div class="add-image-btn" onclick="triggerAddImage(this)">
                            <i class="fas fa-plus"></i>
                            <span>添加图片</span>
                        </div>
                    </div>
                    <div class="plate-section">
                        <h4>需要的盘子</h4>
                        <div class="plate-form">
                            <input type="text" class="plate-input" placeholder="输入盘子形状，例如 8寸圆盘">
                            <button class="plate-add-btn" onclick="addPlateToCard(this)">添加</button>
                        </div>
                        <ul class="plate-list">${platesHTML}</ul>
                    </div>
                `;
                
                cardGrid.appendChild(card);
            });
            
            // 更新卡片ID计数器
            if (allCardsData.length > 0) {
                const maxId = Math.max(...allCardsData.map(card => parseInt(card.id)));
                cardIdCounter = maxId + 1;
            }
            
            // 更新总结
            updateSummary();
        }

        function addPlateToCard(button) {
            const plateForm = button.parentElement;
            const plateInput = plateForm.querySelector('.plate-input');
            const plateType = plateInput.value.trim();
            const plateList = plateForm.nextElementSibling;
            const card = button.closest('.card');
            
            if (plateType) {
                const li = document.createElement('li');
                li.className = 'plate-item';
                li.innerHTML = `
                    <span>${plateType}</span>
                    <button class="plate-delete-btn" onclick="deletePlateFromCard(this)">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                plateList.appendChild(li);
                plateInput.value = '';
                
                // 保存卡片数据到localStorage
                saveCardData(card);
                updateSummary();
            }
        }

        function deletePlateFromCard(button) {
            const plateItem = button.parentElement;
            const card = plateItem.closest('.card');
            
            // 二次确认
            if (confirm('确定要删除这个盘子吗？')) {
                plateItem.remove();
                
                // 保存卡片数据到localStorage
                saveCardData(card);
                updateSummary();
            }
        }

        function updateSummary() {
            const summaryContent = document.getElementById('summaryContent');
            const allPlates = [];
            
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.querySelectorAll('.plate-item span').forEach(item => {
                    allPlates.push(item.textContent);
                });
            });
            
            // 按盘子名称聚类
            const plateGroups = {};
            allPlates.forEach(plate => {
                if (!plateGroups[plate]) {
                    plateGroups[plate] = 0;
                }
                plateGroups[plate]++;
            });
            
            let summaryHTML = '';
            const totalCount = allPlates.length;
            
            if (totalCount > 0) {
                summaryHTML = `
                    <div class="summary-header">
                        <h3>共 ${totalCount} 件盘子</h3>
                        <div class="total-price">总价：¥<span id="totalPrice">0</span></div>
                    </div>
                    <ul class="summary-plate-list">
                `;
                
                // 生成聚类后的盘子列表
                Object.entries(plateGroups).forEach(([plate, count]) => {
                    summaryHTML += `
                        <li class="summary-plate-item">
                            <input type="checkbox" class="plate-checkbox" onchange="updatePlateStatus(this)">
                            <span>${plate} ${count > 1 ? `x${count}` : ''}</span>
                            <input type="number" class="plate-price" placeholder="单价" step="0.01" min="0" onchange="updatePlatePrice(this)" data-count="${count}">
                        </li>
                    `;
                });
                
                summaryHTML += `</ul>`;
            } else {
                summaryHTML = '<div class="summary-item"><span>暂无盘子需求</span></div>';
            }
            
            summaryContent.innerHTML = summaryHTML;
            
            // 初始化总价
            calculateTotalPrice();
        }

        // 更新盘子状态
        function updatePlateStatus(checkbox) {
            const plateItem = checkbox.closest('.summary-plate-item');
            if (checkbox.checked) {
                plateItem.classList.add('completed');
            } else {
                plateItem.classList.remove('completed');
            }
        }

        // 更新盘子价格
        function updatePlatePrice(input) {
            calculateTotalPrice();
        }

        // 计算总价
        function calculateTotalPrice() {
            const priceInputs = document.querySelectorAll('.plate-price');
            let total = 0;
            
            priceInputs.forEach(input => {
                if (input.value) {
                    const price = parseFloat(input.value) || 0;
                    const count = parseInt(input.dataset.count) || 1;
                    total += price * count;
                }
            });
            
            const totalPriceElement = document.getElementById('totalPrice');
            if (totalPriceElement) {
                totalPriceElement.textContent = total.toFixed(2);
            }
        }

        window.onload = function() {
            // 从localStorage加载卡片数据
            loadCardData();
            
            // 注册 Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('./service-worker.js')
                        .then(function(registration) {
                            console.log('Service Worker 注册成功:', registration.scope);
                        })
                        .catch(function(error) {
                            console.log('Service Worker 注册失败:', error);
                        });
                });
            }
        };
    </script>
</body>
</html>
